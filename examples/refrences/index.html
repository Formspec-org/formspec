<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formspec — Reference Examples</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-primary:      #005ea2;
      --color-primary-dark: #1a4480;
      --color-primary-light:#d9e8f6;
      --color-success:      #00a91c;
      --color-warning:      #ffbe2e;
      --color-error:        #e52207;
      --color-neutral-50:   #f9f9f9;
      --color-neutral-100:  #f0f0f0;
      --color-neutral-200:  #dfe1e2;
      --color-neutral-700:  #565c65;
      --color-text:         #1b1b1b;
      --font:               -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius:             4px;
    }

    /* No global input/textarea/select/button rules — they cascade into <formspec-render> and fight
       the default skin + USWDS adapter (usa-input, usa-button, grid layout). Shell controls use
       explicit classes (.fixture-select, .action-btn, .example-tab, …). */

    body {
      font-family: var(--font);
      font-size: 16px;
      color: var(--color-text);
      background: var(--color-neutral-50);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .site-header {
      background: var(--color-primary);
      color: #fff;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .site-header h1 {
      font-size: 18px;
      font-weight: 600;
    }
    .header-badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.6);
      padding: 3px 8px;
      border-radius: 2px;
      color: #fff;
      text-decoration: none;
    }
    .header-badge:hover {
      background: rgba(255,255,255,0.15);
    }
    .header-links {
      margin-left: auto;
      display: flex;
      gap: 16px;
    }
    .header-links a {
      color: rgba(255,255,255,0.9);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
    }
    .header-links a:hover { color: #fff; text-decoration: underline; }

    /* ── Layout ── */
    .app-body {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 0;
      flex: 1;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      padding: 24px;
      align-items: start;
    }

    /* ── Example sidebar ── */
    .example-nav {
      position: sticky;
      top: 24px;
      background: #fff;
      border: 1px solid var(--color-neutral-200);
      border-radius: var(--radius);
      padding: 16px;
    }
    .example-nav h3 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-neutral-700);
      margin-bottom: 12px;
    }
    .example-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .example-list li {
      padding: 10px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.1s;
    }
    .example-list li:hover {
      background: #edf5ff;
    }
    .example-list li.active {
      background: var(--color-primary-light);
      color: var(--color-primary-dark);
      font-weight: 600;
    }
    .example-list li .example-name {
      font-size: 14px;
      font-weight: 600;
      display: block;
    }
    .example-list li .example-desc {
      font-size: 12px;
      color: var(--color-neutral-700);
      margin-top: 2px;
      display: block;
    }
    .example-list li.active .example-desc {
      color: var(--color-primary-dark);
      opacity: 0.8;
    }

    /* ── Main content ── */
    .main-area {
      margin-left: 24px;
      min-height: 400px;
    }

    .form-container {
      background: #fff;
      border: 1px solid var(--color-neutral-200);
      border-radius: var(--radius);
      padding: 32px;
    }
    .form-container formspec-render { display: block; }

    /* USWDS adapter SCSS caps .formspec-wizard-panel at 32rem; use full width inside this shell. */
    .live-form-frame .formspec-wizard-panel {
      max-width: 100%;
      box-sizing: border-box;
    }

    /* ── Example info bar ── */
    .example-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: #fff;
      border: 1px solid var(--color-neutral-200);
      border-radius: var(--radius);
    }
    .example-info h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--color-primary-dark);
    }
    .example-info .info-version {
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      background: var(--color-primary-light);
      color: var(--color-primary-dark);
    }
    .example-info .info-desc {
      font-size: 13px;
      color: var(--color-neutral-700);
      margin-left: auto;
    }

    /* ── Loading / empty state ── */
    .state-message {
      text-align: center;
      padding: 80px 20px;
      color: var(--color-neutral-700);
    }
    .state-message h2 {
      font-size: 20px;
      color: var(--color-primary-dark);
      margin-bottom: 8px;
    }
    .state-message p {
      font-size: 14px;
      max-width: 40ch;
      margin: 0 auto;
    }

	    /* ── Submit results panel ── */
	    .client-response {
	      margin-top: 10px;
	    }
	    .client-response h3 {
	      font-size: 14px;
	      font-weight: 700;
	      margin-bottom: 8px;
	      color: var(--color-neutral-700);
	      text-transform: uppercase;
	      letter-spacing: 0.05em;
	    }
	    .client-meta {
	      font-size: 12px;
	      color: var(--color-neutral-700);
	      margin: 6px 0 10px;
	    }
	    .client-empty {
	      font-size: 13px;
	      color: var(--color-neutral-700);
	      margin: 0 0 10px;
	    }
	    .client-details summary {
	      cursor: pointer;
	      font-weight: 700;
	      color: var(--color-primary-dark);
	      margin: 8px 0;
	    }
	    .client-response pre {
	      background: #f6f8fa;
	      border: 1px solid var(--color-neutral-200);
	      border-radius: var(--radius);
	      padding: 16px;
	      font-size: 12px;
	      overflow-x: auto;
	      white-space: pre-wrap;
	    }

	    /* ── Form actions ── */
	    .form-actions {
	      display: flex;
	      gap: 10px;
	      align-items: center;
	      margin-bottom: 14px;
	    }
	    .action-btn {
	      border-radius: var(--radius);
	      border: 1px solid var(--color-neutral-200);
	      background: #fff;
	      color: var(--color-primary-dark);
	      padding: 8px 12px;
	      font-weight: 700;
	      cursor: pointer;
	      font-family: var(--font);
	    }
	    .action-btn:hover { border-color: var(--color-primary); background: var(--color-primary-light); }
	    .action-btn.secondary { color: var(--color-neutral-700); }

	    .fixture-select {
	      display: inline-block;
	      width: auto;
	      min-width: 160px;
	      padding: 7px 10px;
	      font-size: 13px;
	      font-weight: 600;
	      font-family: var(--font);
	      line-height: 1.5;
	      border: 1px solid var(--color-neutral-200);
	      border-radius: var(--radius);
	      color: var(--color-primary-dark);
	      background: #fff;
	      cursor: pointer;
	    }
	    .fixture-select:focus {
	      outline: 2px solid var(--color-primary);
	      outline-offset: 0;
	      border-color: var(--color-primary);
	    }
	    .fixture-select:hover { border-color: var(--color-primary); }

	    /* ── Example tabs (grouped: interactive vs source JSON) ── */
	    .example-tabs {
	      display: flex;
	      flex-wrap: wrap;
	      align-items: stretch;
	      gap: 14px 18px;
	      padding: 4px 0 16px;
	      margin-bottom: 6px;
	      border-bottom: 1px solid var(--color-neutral-200);
	    }
	    .tab-group {
	      display: flex;
	      flex-direction: column;
	      gap: 8px;
	      padding: 10px 14px 12px;
	      border-radius: 8px;
	      border: 1px solid var(--color-neutral-200);
	      min-width: min(100%, 200px);
	      flex: 1 1 auto;
	    }
	    .tab-group--experience {
	      background: linear-gradient(165deg, var(--color-primary-light) 0%, #fff 55%);
	      border-color: rgba(0, 94, 162, 0.28);
	      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8) inset;
	    }
	    .tab-group--source {
	      background: linear-gradient(180deg, #f4f6f8 0%, #fafbfc 100%);
	      border-color: #c9ced3;
	    }
	    .tab-group-label {
	      font-size: 10px;
	      font-weight: 800;
	      text-transform: uppercase;
	      letter-spacing: 0.11em;
	      color: var(--color-neutral-700);
	      line-height: 1.2;
	    }
	    .tab-group--source .tab-group-label {
	      font-family: ui-monospace, 'SF Mono', 'Fira Code', monospace;
	      letter-spacing: 0.06em;
	      color: #3d4551;
	    }
	    .tab-group-pills {
	      display: flex;
	      flex-wrap: wrap;
	      gap: 6px;
	      align-items: center;
	    }
	    .tab-rail-divider {
	      width: 1px;
	      min-height: 48px;
	      align-self: center;
	      background: linear-gradient(
	        180deg,
	        transparent 0%,
	        var(--color-neutral-200) 20%,
	        var(--color-neutral-200) 80%,
	        transparent 100%
	      );
	      flex-shrink: 0;
	    }

	    .example-tab {
	      border-radius: 999px;
	      border: 1px solid var(--color-neutral-200);
	      background: #fff;
	      color: var(--color-neutral-700);
	      padding: 7px 14px;
	      font-weight: 800;
	      cursor: pointer;
	      font-family: var(--font);
	      letter-spacing: 0.01em;
	      transition: border-color 0.12s ease, background 0.12s ease, color 0.12s ease;
	    }
	    .example-tab--source {
	      font-family: ui-monospace, 'SF Mono', 'Fira Code', monospace;
	      font-size: 12px;
	      font-weight: 700;
	      letter-spacing: 0.02em;
	      border-radius: 6px;
	      padding: 6px 11px;
	      background: #fff;
	      border-color: #c5cad1;
	      color: #2e3642;
	    }
	    .example-tab--form:hover {
	      border-color: var(--color-primary);
	      background: #fff;
	      color: var(--color-primary-dark);
	    }
	    .example-tab--results:hover {
	      border-color: var(--color-success);
	      background: #e7f4e9;
	      color: #146c2e;
	    }
	    .example-tab--source:hover {
	      border-color: #718096;
	      background: #edf2f7;
	      color: #1a202c;
	    }
	    .example-tab--form.active,
	    .example-tab--form[aria-selected="true"] {
	      border-color: var(--color-primary);
	      background: var(--color-primary);
	      color: #fff;
	      box-shadow: 0 1px 2px rgba(0, 52, 102, 0.2);
	    }
	    .example-tab--results.active,
	    .example-tab--results[aria-selected="true"] {
	      border-color: #146c2e;
	      background: #146c2e;
	      color: #fff;
	      box-shadow: 0 1px 2px rgba(20, 108, 46, 0.25);
	    }
	    .example-tab--source.active,
	    .example-tab--source[aria-selected="true"] {
	      border-color: #2d3748;
	      background: #2d3748;
	      color: #f7fafc;
	      box-shadow: 0 1px 2px rgba(45, 55, 72, 0.35);
	    }

	    .example-tabpanel { display: none; }
	    .example-tabpanel.active { display: block; }

	    .tabpanel-shell {
	      border-radius: 0 8px 8px 0;
	      padding: 0 0 8px 14px;
	      margin-left: 0;
	      border-left: 4px solid var(--color-neutral-200);
	      min-height: 12px;
	    }
	    .tabpanel-shell--form {
	      border-left-color: var(--color-primary);
	      background: linear-gradient(90deg, rgba(0, 94, 162, 0.06) 0%, transparent 42%);
	    }
	    .tabpanel-shell--results {
	      border-left-color: #146c2e;
	      background: linear-gradient(90deg, rgba(20, 108, 46, 0.07) 0%, transparent 45%);
	    }
	    .tabpanel-shell--artifact {
	      border-left-color: #4a5568;
	      background: linear-gradient(90deg, rgba(74, 85, 104, 0.06) 0%, transparent 40%);
	      padding-top: 4px;
	    }

	    .live-form-frame { margin: 0; }
	    .live-form-head,
	    .results-panel-head,
	    .artifact-panel-head {
	      display: flex;
	      flex-wrap: wrap;
	      align-items: baseline;
	      gap: 8px 12px;
	      margin-bottom: 12px;
	      padding-bottom: 8px;
	      border-bottom: 1px dashed var(--color-neutral-200);
	    }
	    .live-form-badge,
	    .results-badge,
	    .artifact-badge {
	      font-size: 10px;
	      font-weight: 800;
	      text-transform: uppercase;
	      letter-spacing: 0.1em;
	      padding: 3px 8px;
	      border-radius: 4px;
	      line-height: 1.2;
	    }
	    .live-form-badge {
	      background: var(--color-primary-light);
	      color: var(--color-primary-dark);
	      border: 1px solid rgba(0, 94, 162, 0.35);
	    }
	    .results-badge {
	      background: #e7f4e9;
	      color: #146c2e;
	      border: 1px solid rgba(20, 108, 46, 0.35);
	    }
	    .artifact-badge {
	      font-family: ui-monospace, 'SF Mono', 'Fira Code', monospace;
	      letter-spacing: 0.05em;
	      background: #edf2f7;
	      color: #2d3748;
	      border: 1px solid #cbd5e0;
	    }
	    .live-form-head {
	      margin-top: 10px;
	    }
	    .live-form-note,
	    .results-head-note,
	    .artifact-head-note {
	      font-size: 13px;
	      color: var(--color-neutral-700);
	      line-height: 1.4;
	    }
	    .results-panel-title {
	      font-size: 14px;
	      font-weight: 700;
	      margin-bottom: 6px;
	      color: var(--color-primary-dark);
	    }

	    .json-source-panel { margin-top: 0; }
	    .json-source-path {
	      font-size: 12px;
	      font-weight: 600;
	      color: #2d3748;
	      font-family: ui-monospace, 'SF Mono', 'Fira Code', monospace;
	      margin-bottom: 10px;
	      word-break: break-all;
	    }
	    .json-source-pre {
	      background: #f7f9fb;
	      border: 1px solid #e2e6ea;
	      border-radius: var(--radius);
	      padding: 16px;
	      font-size: 11px;
	      line-height: 1.45;
	      overflow-x: auto;
	      white-space: pre-wrap;
	      max-height: min(70vh, 720px);
	      overflow-y: auto;
	    }

	    @media (max-width: 768px) {
	      .tab-rail-divider {
	        display: none;
	      }
	      .example-tabs {
	        flex-direction: column;
	        align-items: stretch;
	      }
	      .tab-group {
	        min-width: 100%;
	      }
	    }

	    /* ── Wizard step indicators — hidden (let form handle navigation) ── */
	    .formspec-wizard-steps { display: none !important; }

    /* ── Mobile layout ── */
    @media (max-width: 768px) {
      .site-header { padding: 10px 16px; }
      .site-header h1 { font-size: 15px; }
      .app-body { grid-template-columns: 1fr; padding: 12px 16px; gap: 12px; }
      .example-nav { position: static; }
      .main-area { margin-left: 0; }
      .form-container { padding: 16px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="/" class="header-badge">Formspec</a>
  <h1>Reference Examples</h1>
  <div class="header-links">
    <a href="tools.html">Developer Tools</a>
  </div>
</header>

<div class="app-body">
  <!-- Example sidebar -->
  <nav class="example-nav" aria-label="Example forms">
    <h3>Examples</h3>
    <ul class="example-list" id="example-list"></ul>
  </nav>

  <!-- Main form content -->
  <main class="main-area" id="main-area">
    <div class="state-message" id="empty-state">
      <h2>Select an Example</h2>
      <p>Choose a form from the sidebar to render it.</p>
    </div>
  </main>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
