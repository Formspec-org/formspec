name: Publish PyPI

on:
  push:
    tags: ["py-v*"]

permissions:
  id-token: write

jobs:
  # ── formspec-rust native wheels (maturin) ──────────────────────────
  build-wheels:
    name: Wheels (${{ matrix.os }} ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x86_64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m crates/formspec-py/Cargo.toml
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  # ── formspec-rust sdist ────────────────────────────────────────────
  build-sdist:
    name: sdist (formspec-rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m crates/formspec-py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist-rust
          path: dist/*.tar.gz

  # ── formspec pure Python sdist + wheel ─────────────────────────────
  build-pure:
    name: sdist + wheel (formspec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build --outdir dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-pure
          path: dist/*

  # ── Publish to PyPI via trusted publishing ─────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist, build-pure]
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish formspec-rust
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
      - name: Publish formspec
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
