<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>$title$</title>
<style>
  body { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; color: #1f2328; line-height: 1.6; font-size: 16px; }
  #TOC { background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; padding: 1rem 1.5rem; margin-bottom: 2rem; }
  #TOC > ul { list-style: none; padding-left: 0; }
  #TOC ul { padding-left: 1.5rem; }
  #TOC li { margin: 0.15rem 0; font-size: 14px; }
  #TOC a { text-decoration: none; color: #0969da; }
  #TOC a:hover { text-decoration: underline; }
  h1 { border-bottom: 2px solid #d0d7de; padding-bottom: 0.3rem; }
  h2 { border-bottom: 1px solid #d0d7de; padding-bottom: 0.3rem; margin-top: 2.5rem; }
  h3 { margin-top: 1.5rem; }
  h4 { margin-top: 1.2rem; }
  table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: 14px; }
  th, td { border: 1px solid #d0d7de; padding: 6px 13px; text-align: left; }
  th { background: #f6f8fa; font-weight: 600; }
  pre { background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; padding: 1rem; overflow-x: auto; font-size: 13px; }
  code { font-size: 0.9em; background: #f0f2f5; padding: 0.2em 0.4em; border-radius: 3px; }
  pre code { background: none; padding: 0; }
  blockquote { border-left: 4px solid #d0d7de; margin: 0; padding: 0 1rem; color: #57606a; }
  strong { color: #1f2328; }
  a { color: #0969da; }
  hr { border: none; border-top: 1px solid #d0d7de; margin: 2rem 0; }
</style>
</head>
<body>
$if(toc)$
<nav id="TOC">
<h2>Table of Contents</h2>
$toc$
</nav>
$endif$
$body$
</body>
</html>
